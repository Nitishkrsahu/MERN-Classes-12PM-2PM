<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        .card {
            height: 350px;
            width: 200px;
            border: 1px solid gray;
            padding: 10px;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h3{
            padding: 0;
            margin: 0;
        }
        p{
            padding: 0;
            margin: 0;
        }
        .btn-cart{
            width: 50px;
            display: flex;
            justify-content: center;
            background-color: green;
            border-radius: 5px;
        }
        .bi-cart4{
            color: white;
            font-size: 22px;
        }
        .btn-cart:hover{
            background-color: chartreuse;

        }
        .btn-group{
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    
    <div class="card">
        <div class="card-body">
            <img src="../../public/kids.jpg" alt="kids-fashion" width="100%" height="230">
            <h3>Kids Cloths</h3>
            <p>Blue jacket for kids.</p>
        </div>
        <div class="btn-group">
            <div class="btn-cart">
            <span class="bi bi-cart4"></span>
        </div>
        <div class="btn-cart">
            <span class="bi bi-cart4"></span>
        </div>
        </div>
    </div>
</body>

</html>
