<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">

        .footer-section {

            height: 300px;

            align-items: center;
        }

        .footer-logo {

        }

        }

                <p>1-202-555-0105</p>
                <p>1-202-555-0106</p>
                <p>help@shopper.com</p>

</html>
