<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body {
            background-image: url('../public/netflix.jpg');
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: arial;
            height: 100vh;

        }

        .bg-shade {
            background-color: rgba(0, 4, 3, 0.7);
            height: 1000px;

        }

        header {
            display: flex;
            justify-content: space-between;
            color: white;
            height: 80px;
            align-items: center;
            padding-left: 120px;
            padding-right: 120px;
        }

        .brand-title {
            color: #E50914;
            font-size: 45px;
            font-weight: bold;
        }

        .btn-icon {
            display: flex;

        }

        .lang-btn {
            border: 1px solid white;
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 5px;
            padding-bottom: 5px;
            border-radius: 5px;
            margin-right: 15px;
        }

        .sign-btn {
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 5px;
            padding-bottom: 5px;
            border-radius: 5px;
            background-color: #E50914;
        }

        section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .title-head {
            font-size: 60px;
            font-weight: bold;
        }

        .title-des {
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .sign-in {
            display: flex;
            margin-top: 20px;
        }

        .email-input {
            display: inline-block;
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 15px;
            padding-bottom: 15px;
            border: 1px solid white;
            width: 300px;
            color: gray;
            border-radius: 5px;
        }
        .btn-start{
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 5px;
            background-color: #E50914;
            margin-left: 15px;
        }
        .btn-txt{
            font-size: 23px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="bg-shade">
        <header>
            <div>
                <span class="brand-title">NETFLIX</span>
            </div>
            <div class="btn-icon">
                <div class="lang-btn">
                    <span class="bi bi-translate"> English</span>
                    <span class="bi bi-chevron-down"></span>
                </div>
                <div class="sign-btn">
                    <span> Sign In</span>
                </div>
            </div>
        </header>
        <section>
            <div>
                <div class="title-head">Unlimited movies,<br> shows, and more</div>
                <div class="title-des">Starts at ₹149. Cancel at any time.</div>
                <div>Ready to watch? Enter your email to create or restart your membership.</div>
                <div class="sign-in">
                    <div>
                        <span class="email-input">Email address</span>
                    </div>
                    <div class="btn-start">
                        <span class="btn-txt">Get Started</span>
                        <span class="bi bi-chevron-right"></span>
                    </div>
                </div>
            </div>

        </section>
    </div>
</body>

</html>
