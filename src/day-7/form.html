<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body{
            height: 100vh;
            background-image: linear-gradient(green, yellow, blue, 20%);
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">
    <form class="border border-2 rounded-3 p-4">
        <h2 class="text-center">Login</h2>
        <div>
            <label>UserName</label>
            <div class="input-group">
                <span class="bi bi-person input-group-text"></span>
                <input type="text" class="form-control">
            </div>
        </div>
        <div>
            <label>Password</label>
            <div class="input-group">
                <span class="bi bi-key-fill input-group-text"></span>
                <input type="password" class="form-control">
            </div>
        </div>
        <button class="btn btn-warning w-100 mt-2">Submit</button>
    </form>
</body>

</html>
