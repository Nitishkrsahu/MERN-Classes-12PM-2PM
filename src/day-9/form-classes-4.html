<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input:optional+span{
            display: none;
        }
        input:required+span{
            display: inline;
            color: red;
        }
        input:invalid+span{
            display: inline;
            color: red;
        }
        input:invalid~div{
            display: block;
            color: red;
            font-size: 12px;
        }
        input:valid~div{
            display: none;
        }
        input:invalid{
            outline: none;
            border: 1px solid red;
        }
    </style>
</head>

<body>
    <form>
        <dl>
            <dt>UserName</dt>
            <dd>
                <input type="text" class="UserName" required><span>*</span>
                <div>Name Required</div>
            </dd>
            <dt>Mobile</dt>
            <dd>
                <input type="text" class="mobile" pattern="\+91\d{10}">
                <span>*</span>
                <div>Invalid Mobile</div>
            </dd>
            <dt>Password</dt>
            <dd>
                <input type="password" required class="pwd"><span>*</span>
                <div>Password Required</div>
            </dd>
            <button>Register</button>
        </dl>
    </form>
</body>

</html>
